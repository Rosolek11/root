<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prognoza Pogody</title>

    <link rel="stylesheet" href="styles.css" type="text/css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sprawdź pogodę</h1>
        </header>

        <main>
            <div class="search-section">
                <input type="text" id="city-input" placeholder="Wpisz miasto (np. Szczecin)">
                <button id="weather-btn">Szukaj</button>
            </div>

            <section id="current-weather" class="hidden">
            </section>

            <section id="forecast" class="hidden">
                <h2>Prognoza pogody (5 dni)</h2>
                <div id="forecast-container">
                </div>
            </section>
        </main>
    </div>
</body>
</html>
